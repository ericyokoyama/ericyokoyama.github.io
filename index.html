
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eric Kenji Yokoyama</title>

<style>

:root{
    --bg:#050816;
    --card:#0f172a;
    --blue:#3b82f6;
    --blue-light:#60a5fa;
    --text:#f8fafc;
    --text-soft:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,rgba(59,130,246,.2),transparent 70%);
    top:-250px;
    right:-150px;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(96,165,250,.15),transparent 70%);
    bottom:-200px;
    left:-100px;
    z-index:-1;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:0 30px;
}

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
}

.hero-content{
    max-width:800px;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    border:1px solid rgba(96,165,250,.3);
    border-radius:999px;
    background:rgba(59,130,246,.08);
    color:var(--blue-light);
    margin-bottom:25px;
}

h1{
    font-size:clamp(3rem,8vw,6rem);
    line-height:1;
    margin-bottom:15px;
}

.gradient{
    background:linear-gradient(90deg,#ffffff,#60a5fa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:1.4rem;
    color:var(--blue-light);
    margin-bottom:25px;
}

.description{
    color:var(--text-soft);
    font-size:1.1rem;
    line-height:1.8;
    max-width:700px;
    margin-bottom:35px;
}

.btn{
    display:inline-block;
    background:linear-gradient(135deg,var(--blue),var(--blue-light));
    color:white;
    text-decoration:none;
    padding:14px 26px;
    border-radius:12px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(59,130,246,.3);
}

section{
    padding:100px 0;
}

.section-title{
    font-size:2.2rem;
    margin-bottom:40px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(15,23,42,.7);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:30px;
    backdrop-filter:blur(10px);
    transition:.35s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:rgba(96,165,250,.4);
}

.card h3{
    margin-bottom:12px;
    color:#fff;
}

.card p{
    color:var(--text-soft);
}

.timeline{
    max-width:800px;
    margin:auto;
    text-align:center;
}

.timeline p{
    color:var(--text-soft);
    font-size:1.1rem;
    line-height:1.9;
}

footer{
    padding:50px 20px;
    text-align:center;
    color:#64748b;
}

.fade{
    opacity:0;
    transform:translateY(30px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>
<body>
